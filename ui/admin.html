<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IgnitionFlash — Admin Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --black:   #080a0c;
    --dark:    #0d1014;
    --panel:   #111418;
    --card:    #161b20;
    --border:  #1e262e;
    --border2: #2a3540;
    --spark:   #ff6b00;
    --spark2:  #ffaa00;
    --spark3:  #ff3d00;
    --steel:   #8a9baa;
    --text:    #cdd8e0;
    --dim:     #4a5a68;
    --success: #00c97a;
    --danger:  #ff3b3b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Фоновый узор ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,107,0,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,107,0,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Верхняя полоса-искра ── */
  .spark-line {
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--spark3), var(--spark2), var(--spark), transparent);
    position: relative;
    animation: spark-pulse 3s ease-in-out infinite;
  }
  @keyframes spark-pulse {
    0%, 100% { opacity: .6; }
    50%       { opacity: 1; }
  }

  /* ── Шапка ── */
  header {
    position: relative;
    z-index: 1;
    background: var(--dark);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    position: relative;
  }

  /* SVG искра */
  .logo-icon svg { width: 36px; height: 36px; }

  .logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1;
  }

  .logo-text .brand {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #fff;
    text-transform: uppercase;
  }

  .logo-text .brand span {
    color: var(--spark);
  }

  .logo-text .sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 2px;
    margin-top: 3px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 8px var(--success);
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: .4; }
  }

  /* ── Главный контент ── */
  .container {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 24px 60px;
  }

  /* ── Секция заголовок ── */
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .section-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--spark);
    text-transform: uppercase;
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border2), transparent);
  }

  /* ── Карточка авторизации ── */
  .auth-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 24px;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
    overflow: hidden;
  }

  .auth-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--spark3), var(--spark2));
  }

  .auth-card label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--steel);
    text-transform: uppercase;
    white-space: nowrap;
    font-family: 'Share Tech Mono', monospace;
  }

  .auth-input {
    flex: 1;
    background: var(--dark);
    border: 1px solid var(--border2);
    color: var(--spark2);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 10px 14px;
    border-radius: 2px;
    outline: none;
    letter-spacing: 2px;
    transition: border-color .2s;
  }

  .auth-input:focus {
    border-color: var(--spark);
    box-shadow: 0 0 0 1px rgba(255,107,0,.2);
  }

  .auth-input::placeholder { color: var(--dim); letter-spacing: 1px; }

  .btn-auth {
    background: linear-gradient(135deg, var(--spark3), var(--spark));
    border: none;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 20px;
    border-radius: 2px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity .2s, transform .1s;
  }

  .btn-auth:hover   { opacity: .9; }
  .btn-auth:active  { transform: scale(.98); }

  /* ── Upload зона ── */
  .upload-zone {
    background: var(--panel);
    border: 1px dashed var(--border2);
    border-radius: 2px;
    padding: 40px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    position: relative;
    margin-bottom: 32px;
  }

  .upload-zone:hover,
  .upload-zone.drag  {
    border-color: var(--spark);
    background: rgba(255,107,0,.04);
  }

  .upload-zone input { display: none; }

  .upload-icon {
    width: 48px;
    height: 48px;
    margin: 0 auto 16px;
    opacity: .5;
  }

  .upload-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #fff;
    margin-bottom: 6px;
  }

  .upload-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 1px;
  }

  .upload-file-name {
    margin-top: 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--spark2);
    display: none;
  }

  .upload-file-name.show { display: block; }

  /* ── Кнопка загрузки ── */
  .btn-upload {
    display: block;
    width: 100%;
    background: var(--card);
    border: 1px solid var(--spark);
    color: var(--spark);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 14px;
    border-radius: 2px;
    cursor: pointer;
    margin-bottom: 32px;
    transition: background .2s, color .2s;
    position: relative;
    overflow: hidden;
  }

  .btn-upload::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--spark3), var(--spark));
    opacity: 0;
    transition: opacity .2s;
  }

  .btn-upload:hover::before  { opacity: 1; }
  .btn-upload:hover          { color: #fff; border-color: transparent; }
  .btn-upload:disabled       { opacity: .3; cursor: not-allowed; }

  .btn-upload span { position: relative; z-index: 1; }

  /* ── Прогресс загрузки ── */
  .progress-wrap {
    display: none;
    margin-bottom: 32px;
  }

  .progress-wrap.show { display: block; }

  .progress-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
  }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--spark3), var(--spark2));
    border-radius: 2px;
    width: 0%;
    transition: width .3s;
    box-shadow: 0 0 8px var(--spark);
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: var(--panel);
    border: 1px solid var(--border2);
    border-radius: 2px;
    padding: 14px 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 10px;
    transform: translateY(20px);
    opacity: 0;
    transition: transform .3s, opacity .3s;
    z-index: 100;
    max-width: 360px;
  }

  .toast.show   { transform: translateY(0); opacity: 1; }
  .toast.ok     { border-left: 3px solid var(--success); color: var(--success); }
  .toast.err    { border-left: 3px solid var(--danger);  color: var(--danger);  }

  /* ── Таблица прошивок ── */
  .fw-table {
    width: 100%;
    border-collapse: collapse;
  }

  .fw-table th {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
    text-align: left;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }

  .fw-table td {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--card);
    vertical-align: middle;
  }

  .fw-table tr:last-child td { border-bottom: none; }

  .fw-table tr:hover td {
    background: #1a2028;
  }

  .fw-name {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--text);
    letter-spacing: .5px;
  }

  .fw-name .ext { color: var(--dim); }

  .fw-size {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--steel);
  }

  .fw-date {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
  }

  .fw-tag {
    display: inline-block;
    background: rgba(255,107,0,.1);
    border: 1px solid rgba(255,107,0,.25);
    color: var(--spark);
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    padding: 2px 8px;
    border-radius: 1px;
    text-transform: uppercase;
  }

  .fw-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .btn-action {
    background: var(--panel);
    border: 1px solid var(--border2);
    color: var(--steel);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 6px 12px;
    border-radius: 2px;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: border-color .2s, color .2s;
    text-transform: uppercase;
  }

  .btn-action:hover      { border-color: var(--spark2); color: var(--spark2); }
  .btn-action.del:hover  { border-color: var(--danger);  color: var(--danger);  }

  /* Пустое состояние */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    background: var(--card);
    border: 1px solid var(--border);
  }

  .empty-state .icon { font-size: 36px; opacity: .3; margin-bottom: 12px; }
  .empty-state p {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 2px;
  }

  /* Статистика вверху */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 16px 20px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--spark3), transparent);
    opacity: .4;
  }

  .stat-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
  }

  .stat-value span { color: var(--spark); font-size: 14px; margin-left: 4px; }

  /* ── Шифрование индикатор ── */
  .enc-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--success);
    letter-spacing: 1px;
    padding: 4px 10px;
    border: 1px solid rgba(0,201,122,.2);
    border-radius: 1px;
    background: rgba(0,201,122,.05);
  }

  .enc-badge::before {
    content: '⬡';
    font-size: 10px;
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(12px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .container > * {
    animation: fadeUp .4s ease both;
  }
  .container > *:nth-child(2) { animation-delay: .05s; }
  .container > *:nth-child(3) { animation-delay: .10s; }
  .container > *:nth-child(4) { animation-delay: .15s; }
  .container > *:nth-child(5) { animation-delay: .20s; }
</style>
</head>
<body>

<div class="spark-line"></div>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="20,2 8,20 17,20 16,34 28,16 19,16" fill="#ff6b00"/>
        <polygon points="20,2 8,20 17,20 16,34 28,16 19,16" fill="url(#sg)" opacity=".6"/>
        <defs>
          <linearGradient id="sg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#ff3d00"/>
            <stop offset="100%" stop-color="#ffaa00"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <div class="logo-text">
      <div class="brand">Ignition<span>Flash</span></div>
      <div class="sub">FIRMWARE MANAGEMENT SYSTEM</div>
    </div>
  </div>
  <div class="header-right">
    <div class="enc-badge">AES-128-CTR · HMAC-SHA256</div>
    <div class="status-badge">
      <span class="status-dot"></span>
      SYSTEM ONLINE
    </div>
  </div>
</header>

<div class="container">

  <!-- Статы -->
  <div class="stats-row" id="stats-row">
    <div class="stat-card">
      <div class="stat-label">Firmwares Stored</div>
      <div class="stat-value" id="stat-count">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Encryption</div>
      <div class="stat-value" style="font-size:16px;padding-top:6px;color:var(--spark)">AES-128-CTR</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Integrity</div>
      <div class="stat-value" style="font-size:16px;padding-top:6px;color:var(--spark)">HMAC-SHA256</div>
    </div>
  </div>

  <!-- Auth -->
  <div class="section-header">
    <span class="section-label">Admin Token</span>
    <div class="section-line"></div>
  </div>

  <div class="auth-card">
    <label>TOKEN</label>
    <input class="auth-input" type="password" id="token-input"
           placeholder="enter admin token...">
    <button class="btn-auth" onclick="saveToken()">AUTHENTICATE</button>
  </div>

  <!-- Upload -->
  <div class="section-header">
    <span class="section-label">Upload Firmware</span>
    <div class="section-line"></div>
  </div>

  <div class="upload-zone" id="drop-zone" onclick="document.getElementById('fw-file').click()">
    <input type="file" id="fw-file" accept=".bin">
    <div class="upload-icon">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="6" y="30" width="36" height="4" rx="1" fill="#ff6b00" opacity=".4"/>
        <rect x="6" y="36" width="36" height="4" rx="1" fill="#ff6b00" opacity=".2"/>
        <path d="M24 6 L24 26 M14 16 L24 6 L34 16" stroke="#ff6b00" stroke-width="2.5"
              stroke-linecap="square"/>
      </svg>
    </div>
    <div class="upload-title">DROP FIRMWARE FILE</div>
    <div class="upload-sub">or click to browse · .bin format only</div>
    <div class="upload-file-name" id="file-name-display"></div>
  </div>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-label">
      <span id="progress-status">ENCRYPTING & UPLOADING...</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <button class="btn-upload" id="upload-btn" onclick="uploadFirmware()" disabled>
    <span>⬡ &nbsp;ENCRYPT &amp; UPLOAD FIRMWARE</span>
  </button>

  <!-- Список -->
  <div class="section-header">
    <span class="section-label">Firmware Library</span>
    <div class="section-line"></div>
  </div>

  <div id="fw-list-wrap"></div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  let adminToken = localStorage.getItem('admin_token') || '';

  // ── Инициализация ─────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    if (adminToken) {
      document.getElementById('token-input').value = adminToken;
    }
    loadFirmwares();
  });

  // ── Токен ─────────────────────────────────
  function saveToken() {
    adminToken = document.getElementById('token-input').value.trim();
    localStorage.setItem('admin_token', adminToken);
    toast('Token saved', 'ok');
    loadFirmwares();
  }

  document.getElementById('token-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveToken();
  });

  // ── Выбор файла ───────────────────────────
  document.getElementById('fw-file').addEventListener('change', function() {
    const f = this.files[0];
    if (!f) return;
    const el = document.getElementById('file-name-display');
    el.textContent = '▸ ' + f.name + '  (' + (f.size / 1024).toFixed(1) + ' KB)';
    el.classList.add('show');
    document.getElementById('upload-btn').disabled = false;
  });

  // ── Drag & Drop ───────────────────────────
  const zone = document.getElementById('drop-zone');

  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
  zone.addEventListener('dragleave', ()  => zone.classList.remove('drag'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag');
    const f = e.dataTransfer.files[0];
    if (!f) return;
    const input = document.getElementById('fw-file');
    const dt = new DataTransfer();
    dt.items.add(f);
    input.files = dt.files;
    input.dispatchEvent(new Event('change'));
  });

  // ── Загрузка прошивки ─────────────────────
  async function uploadFirmware() {
    const file = document.getElementById('fw-file').files[0];
    if (!file) { toast('Select a .bin file first', 'err'); return; }
    if (!adminToken) { toast('Enter admin token first', 'err'); return; }

    const btn = document.getElementById('upload-btn');
    btn.disabled = true;

    const prog = document.getElementById('progress-wrap');
    const fill = document.getElementById('progress-fill');
    const pct  = document.getElementById('progress-pct');
    const pst  = document.getElementById('progress-status');

    prog.classList.add('show');
    pst.textContent = 'ENCRYPTING & UPLOADING...';

    // Анимируем прогресс (реальный XHR для точного прогресса)
    const xhr = new XMLHttpRequest();
    const form = new FormData();
    form.append('firmware', file);

    xhr.upload.addEventListener('progress', e => {
      if (e.lengthComputable) {
        const p = Math.round(e.loaded / e.total * 100);
        fill.style.width = p + '%';
        pct.textContent = p + '%';
      }
    });

    xhr.addEventListener('load', () => {
      try {
        const data = JSON.parse(xhr.responseText);
        if (data.ok) {
          fill.style.width = '100%';
          pct.textContent = '100%';
          pst.textContent = 'UPLOAD COMPLETE';
          toast('Firmware encrypted & uploaded: ' + data.file, 'ok');
          loadFirmwares();
          setTimeout(() => {
            prog.classList.remove('show');
            fill.style.width = '0%';
            document.getElementById('fw-file').value = '';
            document.getElementById('file-name-display').classList.remove('show');
            btn.disabled = true;
          }, 1500);
        } else {
          toast('Error: ' + (data.error || 'unknown'), 'err');
          prog.classList.remove('show');
          btn.disabled = false;
        }
      } catch(e) {
        toast('Server error', 'err');
        prog.classList.remove('show');
        btn.disabled = false;
      }
    });

    xhr.addEventListener('error', () => {
      toast('Network error', 'err');
      prog.classList.remove('show');
      btn.disabled = false;
    });

    xhr.open('POST', '/api/admin/upload');
    xhr.setRequestHeader('X-Admin-Token', adminToken);
    xhr.send(form);
  }

  // ── Список прошивок ───────────────────────
  async function loadFirmwares() {
    try {
      const res  = await fetch('/api/firmwares');
      const list = await res.json();

      document.getElementById('stat-count').textContent = list.length;

      const wrap = document.getElementById('fw-list-wrap');

      if (!list.length) {
        wrap.innerHTML =
          '<div class="empty-state">' +
            '<div class="icon">&#x2B21;</div>' +
            '<p>NO FIRMWARES UPLOADED YET</p>' +
          '</div>';
        return;
      }

      let rows = '';
      list.forEach(function(fw) {
        const nameParts = fw.name.split('.');
        const ext  = nameParts.pop();
        const base = nameParts.join('.');
        const sizeKb = (fw.size / 1024).toFixed(1);
        rows +=
          '<tr>' +
            '<td><div class="fw-name">' + base + '<span class="ext">.' + ext + '</span></div></td>' +
            '<td><span class="fw-tag">ENCRYPTED</span></td>' +
            '<td><span class="fw-size">' + sizeKb + ' KB</span></td>' +
            '<td><span class="fw-date">' + fw.mod_time + '</span></td>' +
            '<td><div class="fw-actions">' +
              '<a class="btn-action" href="/api/firmwares/' + fw.name + '" download>&#x2193; DOWNLOAD</a>' +
              '<button class="btn-action del" onclick="deleteFirmware(\'' + fw.name + '\')">&#x2715; DELETE</button>' +
            '</div></td>' +
          '</tr>';
      });

      wrap.innerHTML =
        '<table class="fw-table">' +
          '<thead><tr>' +
            '<th>FILENAME</th>' +
            '<th>STATUS</th>' +
            '<th>SIZE</th>' +
            '<th>UPLOADED</th>' +
            '<th style="text-align:right">ACTIONS</th>' +
          '</tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
        '</table>';

    } catch(e) {
      document.getElementById('fw-list-wrap').innerHTML =
        '<div class="empty-state"><p>FAILED TO LOAD FIRMWARE LIST</p></div>';
    }
  }

  // ── Удаление ──────────────────────────────
  async function deleteFirmware(name) {
    if (!adminToken) { toast('Enter admin token first', 'err'); return; }
    if (!confirm('Delete ' + name + '?')) return;

    try {
      const res = await fetch('/api/admin/delete/' + encodeURIComponent(name), {
        method: 'DELETE',
        headers: { 'X-Admin-Token': adminToken }
      });
      const data = await res.json();
      if (data.ok) {
        toast('Deleted: ' + name, 'ok');
        loadFirmwares();
      } else {
        toast('Error: ' + (data.error || 'unknown'), 'err');
      }
    } catch(e) {
      toast('Network error', 'err');
    }
  }

  // ── Toast уведомления ─────────────────────
  let toastTimer;
  function toast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = (type === 'ok' ? '✓ ' : '✕ ') + msg.toUpperCase();
    el.className = 'toast show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
  }
</script>
</body>
</html>
